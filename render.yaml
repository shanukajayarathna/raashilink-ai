services:
  - type: web
    name: raashilink-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_BIN
        value: python3
      - key: REDIS_ENABLED
        value: false
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false